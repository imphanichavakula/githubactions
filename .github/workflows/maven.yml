
name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  

jobs:
  Toolsinstall:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
  Mavenbuild:

    runs-on: ubuntu-latest
    needs: Toolsinstall
    steps:
    - uses: actions/checkout@v4
    - name: Build with Maven
   
      run: mvn clean install
      working-directory: Boardgame-main
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
         name: artifact name
         path:  Boardgame-main/target/*.jar
         cache: maven

  Download:

    runs-on: ubuntu-latest
    needs: Mavenbuild
    steps: 
       - name : download
         uses : actions/download-artifact@v4
         with:
          name: artifact name
          cache: maven

         
  DEPLOYMENT:

    runs-on: ubuntu-latest
    needs: Download
    steps:
    - name: Deploy
      run: echo "deployment sucess"
         
         
      
  
