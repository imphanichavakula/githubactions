name: Java CI with Maven

on:
  push:
    branches: ["master"]

env:
  APP_NAME: GITHUB-WORKFLOW

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.filter.outputs.java }}
      docker: ${{ steps.filter.outputs.docker }}
      mytest: ${{ steps.filter.outputs.mytest }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            java:
              - 'src/**'
              - 'pom.xml'
              - '.mvn/**'
              - 'mvnw'
              - 'mvnw.cmd'
            docker:
              - 'Dockerfile'
              - 'docker/**'
            mytest:
              - 'My-Test/**'

  Toolsinstall:
    runs-on: ubuntu-latest
    env:
      job_NAME: tools
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: print job name
        run: echo "$job_NAME"

  Maventest:
    runs-on: ubuntu-latest
    needs: [Toolsinstall, changes]
    if: needs.changes.outputs.mytest == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Test with Maven
        run: mvn test
        working-directory: Boardgame-main

  Mavenbuild:
    runs-on: ubuntu-latest
    needs: [Toolsinstall, changes]
    if: needs.changes.outputs.java == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Build with Maven
        run: mvn clean install
        working-directory: Boardgame-main
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-name
          path: Boardgame-main/target/*.jar

  Download:
    runs-on: ubuntu-latest
    needs: Mavenbuild
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: artifact-name

  DEPLOYMENT:
    runs-on: ubuntu-latest
    needs: Download
    steps:
      - name: Deploy
        run: echo "deployment success"
